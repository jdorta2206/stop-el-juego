kind = "web"
previewPath = "/"
title = "STOP - El Juego"
version = "1.0.0"
id = "artifacts/stop-game"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20517
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/stop-game run dev"

[services.env]
PORT = "20517"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/stop-game", "run", "build"]
publicDir = "artifacts/stop-game/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
